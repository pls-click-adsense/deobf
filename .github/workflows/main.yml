name: Build IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Project
        run: |
          mkdir -p MoonSecDeobf.swiftpm
          cp ContentView.swift MoonSecDeobf.swiftpm/
          cp MainApp.swift MoonSecDeobf.swiftpm/
          cp Package.swift MoonSecDeobf.swiftpm/
          
      - name: Build Archive
        run: |
          xcodebuild archive \
            -scheme MoonSecDeobf \
            -project MoonSecDeobf.swiftpm \
            -archivePath MoonSecDeobf.xcarchive \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Create IPA
        run: |
          mkdir -p Payload
          # .appファイルを探してPayloadに入れる
          find MoonSecDeobf.xcarchive -name "*.app" -exec cp -r {} Payload/ \;
          # PayloadフォルダをzipしてIPAにする
          zip -r MoonSecDeobf.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Deobfuscator-IPA
          path: MoonSecDeobf.ipa
